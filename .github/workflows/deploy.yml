name: Deploy Laravel to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build frontend
        run: |
          npm install
          npm remove webpack webpack-cli
          npm install webpack@5.88.2 webpack-cli@4.10.0 --save-dev
          npm run production

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p 65002 153.92.10.184 >> ~/.ssh/known_hosts

      - name: Upload files
        run: |
          rsync -avz --delete \
            --exclude=".git" \
            --exclude=".github" \
            --exclude=".env" \
            --exclude="storage" \
            --exclude="node_modules" \
            --exclude="vendor" \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_PATH }}

      - name: Laravel commands
        run: |
          ssh -p ${{ secrets.HOSTINGER_PORT }} ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }} << 'EOF'
            cd ${{ secrets.HOSTINGER_PATH }}

            composer install --no-dev --optimize-autoloader --no-interaction

            php artisan migrate --force
            php artisan optimize:clear
            php artisan optimize

            chmod -R 775 storage bootstrap/cache
          EOF