name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hostinger
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare SSH
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY || secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.HOSTINGER_PORT }}" "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure remote directories exist
        shell: bash
        run: |
          ssh -p "${{ secrets.HOSTINGER_PORT }}" "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}" \
            "mkdir -p '${{ secrets.HOSTINGER_APP_PATH }}'"

      - name: Upload Laravel project
        shell: bash
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".env" \
            --exclude "node_modules/" \
            --exclude "vendor/" \
            --exclude "storage/app/" \
            --exclude "storage/framework/cache/" \
            --exclude "storage/framework/sessions/" \
            --exclude "storage/framework/views/" \
            --exclude "storage/logs/" \
            --exclude "tests/" \
            --exclude "documentation.zip" \
            --exclude "codecanyon-fRKWtib1-stockyultimate-inventory-management-system-with-pos.zip" \
            -e "ssh -p ${{ secrets.HOSTINGER_PORT }}" \
            ./ "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}:${{ secrets.HOSTINGER_APP_PATH }}/"

      - name: Run post-deploy Laravel commands
        shell: bash
        run: |
          ssh -p "${{ secrets.HOSTINGER_PORT }}" "${{ secrets.HOSTINGER_USERNAME }}@${{ secrets.HOSTINGER_HOST }}" <<'EOF'
          set -e
          cd "${{ secrets.HOSTINGER_APP_PATH }}"
          php artisan optimize:clear
          php artisan config:cache
          php artisan view:cache

          if [ "${{ vars.HOSTINGER_RUN_MIGRATIONS }}" = "true" ]; then
            php artisan migrate --force
          fi
          EOF
